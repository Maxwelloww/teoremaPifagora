<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Теорема Пифагора</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Теорема Пифагора</h1>
        <nav>
            <a href="#generate">Генерация задач</a>
            <a href="#solutions">Решения</a>
        </nav>
    </header>

    <section id="generate" class="card fade-in">
        <h2>Генерация задач</h2>
        <div class="image-wrapper">
            <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=600&h=400&fit=crop" alt="Иллюстрация теоремы Пифагора" class="img-center zoom-hover" loading="lazy">
            <div class="image-overlay"></div>
        </div>
        <div class="button-container">
            <button id="generateBtn">
                <span class="btn-icon">🎲</span>
                <span>Сгенерировать задачу</span>
            </button>
        </div>
        <div id="task" class="result-box"></div>
    </section>

    <section id="solutions" class="card fade-in">
        <h2>Решение задач</h2>
        <div class="image-wrapper">
            <img src="https://images.unsplash.com/photo-1509228468518-180dd4864904?w=600&h=400&fit=crop" alt="Изучение математики" class="img-center zoom-hover" loading="lazy">
            <div class="image-overlay"></div>
        </div>
        <div class="button-container">
            <button id="calculateBtn">
                <span class="btn-icon">🧮</span>
                <span>Рассчитать гипотенузу</span>
            </button>
        </div>
        <div class="input-group">
            <input type="number" id="catetA" placeholder="Катет A" />
            <span class="input-divider">+</span>
            <input type="number" id="catetB" placeholder="Катет B" />
            <span class="input-divider">=</span>
            <span class="input-result-placeholder">?</span>
        </div>
        <div id="result" class="result-box highlight"></div>
    </section>

    <footer>
        <p>&copy; 2025 Maxwell</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
